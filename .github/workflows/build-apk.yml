name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test debug APK
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "MoeMemosAndroid-${GITHUB_SHA::7}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoeMemosAndroid-${{ github.sha }}
          path: MoeMemosAndroid-*.apk
          if-no-files-found: error
          retention-days: 30
